<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvEntry</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

    <section class="signup-page">

        <div class="signup-card">

            <div class="logo">
                <h2>LeadFlow CRM.</h2>
            </div>

            <h1>Create an Account</h1>

            <p>Start managing your client leads today.</p>

    <form>


        <div class="input-box">
            <i class="fa-solid fa-user"></i>
            <input type="text" placeholder="Enter you name...">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-user"></i>
            <input type="text" placeholder="Enter your surname..." required>
        </div>

        <div class="input-box">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" placeholder="Enter your email..." required>
        </div>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="Password" required>
        </div>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="Confirm Password" required>
        </div>
        <button type="submit">
            Create Account
        </button>

    </form>

    <div class="login-link">
        <p>Already have an account?</p>
        <a href="login.html">Login</a>
    </div>

    </div>
    </section>
</body>
</html>
