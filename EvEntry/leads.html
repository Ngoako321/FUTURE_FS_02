<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow CRM | Client Lead Management System</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

    <header>
        <div>
            <h1>Lead Management</h1>

            <p>Manage all your client leads</p>
        </div>

    </header>

    <section class="leads-actions">

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input type="text" placeholder="Search leads...">

        </div>
        
        <a href="add-lead.html" class="add-btn">
            <i class="fa-solid fa-plus"></i>
            Add Lead
        </a>

        <table>

            <tr>

                <th>Name</th>
                <th>Company</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Status</th>
                <th>Actions</th>

            </tr>

            <tr>
            <td>John Smith</td>
            <td>Microsoft</td>
            <td>johnsmith@gmail.com</td>
            <td>082 435 4556</td>

            <td><span class="new">New</span></td>

            <td>
                <button>Edit</button>
                <button>Delete</button>

            </td>
            </tr>
            
        </table>

    </section>


</body>
</html>
