<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow CRM | Client Lead Management System</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="dashboard">

        <!---------------Sidebar----------------->
        <aside class="sidebar">
            <h2>LeadFlow</h2>

            <ul>

                <li class="active"><i class="fa-solid fa-table-columns"></i>Dashboard</li>

                <li><i class="fa-solid fa-table-columns"></i>Leads</li>

                <li><i class="fa-solid fa-chart-line"></i>Analytics</li>

                <li><i class="fa-solid fa-gear"></i>Settings</li>

                <li><i class="fa-solid fa-right-from-bracket"></i>Logout</li>

            </ul>

        </aside>

        <!-------Main-------->

        <main class="main">

            <!----Top Bar------>

            <header class="topbar">

                <div>
                    <h1>Dashboard</h1>

                    <p>Welcome back, Admin!</p>

                </div>

                <div class="top-icons">

                    <i class="fa-solid fa-bell"></i>

                    <i class="fa-solid fa-circle-user"></i>


                </div>

            </header>

            <!--------Statistics-------->

            <section class="cards">

                <div class="card">

                    <h3>New Leads</h3>
                    <h2>18</h2>

                </div>

                <div class="card">
                    <h3>Contacted</h3>
                    <h2>170</h2>
                </div>

                <div class="card">
                    <h3>Converted</h3>
                    <h2>57</h2>
                </div>

            </section>


            <!-----Recent Leads------>

            <section class="table">

                <h2>Recent Leads</h2>

                <table>

                    <tr>
                        <th>Name</th>
                        <th>Company</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>

                    <tr>
                        <td>John Smith</td>
                        <td>Microsoft</td>
                        <td><span class="contacted">Contacted</span></td>
                        <td><button>View</button></td>
                    </tr>

                    <tr>
                        <td>David Brown</td>
                        <td>Google</td>
                        <td><span class="converted">Converted</span></td>
                        <td><button>View</button></td>
                    </tr>

                </table>
            </section>

        </main>
    </div>

</body>
</html>
