<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow CRM | Client Lead Management System</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>
<body>

    <div class="lead-details">

        <div class-="details-card">

            <div class="details-header">

                <h1>John Smith</h1>

                <span class="status contacted">
                    Contacted
                </span>

            </div>

            <div class="details-grid">

                <div>
                    <h4>Company</h4>
                    <p>Microsoft</p>
                </div>

                <div>
                    <h4>Email</h4>
                    <p>johnsmith@gmail.com</p>
                </div>

                <div>
                    <h4>Phone</h4>
                    <p>082 355 5677</p>
                </div>

                <div>
                    <h4>Lead Source</h4>
                    <p>Website</p>
                </div>


                <div>
                    <h4>Date Added</h4>
                    <p>20 June 2026</p>
                </div>

                <div>
                    <h4>Assigned To</h4>
                    <p>Admin</p>
                </div>


            </div>

            <div class="notes">

                <h3>Notes</h3>

                <p>Client is interested in the Premium CRM package.
                Requested a follow-up call next week.</p>

            </div>

            <div class="details-buttons">

                <button class="edit-btn">
                    <i class="fa-solid fa-pen"></i>
                    Edit
                </button>

                <button class="delete-btn">
                    <i class="fa-solid fa-trash"></i>
                    Delete
                </button>

                <a href="dashboard.html" class="back-btn">
                    <i class="fa-solid fa-arrow-left"></i>
                    Dashboard
                </a>
                
            </div>

        </div>
    </div>
</body>
</html>
